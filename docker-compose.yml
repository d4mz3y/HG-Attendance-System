services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: hg_attendance
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 4s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  app:
    build: .
    entrypoint: ["/bin/sh", "/var/www/html/docker/entrypoint.sh"]
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    env_file:
      - .env.docker
    environment:
      APP_NAME: "Hogan Guards Attendance"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_TIMEZONE: Africa/Lagos
      LOG_CHANNEL: stderr
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: hg_attendance
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
      FILESYSTEM_DISK: public
      COMPOSER_NO_BLOCKING: "1"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
